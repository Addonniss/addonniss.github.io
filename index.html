<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Addonniss Kodi Repository</title>
</head>

<body>

<h2>Addonniss Kodi Repository</h2>
<p>Available repository packages:</p>

<ul id="repo-list"></ul>

<script>
fetch("https://api.github.com/repos/Addonniss/addonniss.github.io/contents/")
.then(response => response.json())
.then(data => {
    const list = document.getElementById("repo-list");

    data.forEach(file => {
        if (file.name.endsWith(".zip")) {
            const li = document.createElement("li");
            const a = document.createElement("a");

            a.href = file.download_url;
            a.textContent = file.name;

            li.appendChild(a);
            list.appendChild(li);
        }
    });
});
</script>

</body>
</html>
